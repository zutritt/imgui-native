name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package after packaging"
        required: true
        type: boolean
        default: false
      dist_tag:
        description: "Registry dist-tag"
        required: true
        type: string
        default: "latest"

permissions:
  contents: read

jobs:
  build-prebuilds:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r deps/dear_bindings/requirements.txt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native addon
        run: bun run build -- --arch=${{ matrix.arch }}

      - name: Collect prebuild binary
        shell: bash
        run: |
          mkdir -p "prebuild/${{ matrix.platform }}-${{ matrix.arch }}"
          cp "build/Release/imgui.node" "prebuild/${{ matrix.platform }}-${{ matrix.arch }}/imgui.node"

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuild/${{ matrix.platform }}-${{ matrix.arch }}/imgui.node
          if-no-files-found: error

  pack:
    name: Assemble package
    runs-on: ubuntu-latest
    needs: build-prebuilds

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r deps/dear_bindings/requirements.txt

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: artifacts

      - name: Reconstruct prebuild layout
        shell: bash
        run: |
          mkdir -p prebuild/linux-x64 prebuild/win32-x64 prebuild/darwin-x64 prebuild/darwin-arm64
          cp artifacts/prebuild-linux-x64/imgui.node prebuild/linux-x64/imgui.node
          cp artifacts/prebuild-win32-x64/imgui.node prebuild/win32-x64/imgui.node
          cp artifacts/prebuild-darwin-x64/imgui.node prebuild/darwin-x64/imgui.node
          cp artifacts/prebuild-darwin-arm64/imgui.node prebuild/darwin-arm64/imgui.node

      - name: Verify prebuild matrix payload
        shell: bash
        run: |
          test -f prebuild/linux-x64/imgui.node
          test -f prebuild/win32-x64/imgui.node
          test -f prebuild/darwin-x64/imgui.node
          test -f prebuild/darwin-arm64/imgui.node

      - name: Verify package contents
        run: bun pm pack --dry-run

      - name: Build package tarball
        id: pack
        shell: bash
        run: |
          TARBALL="$(bun pm pack --quiet)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: pack
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: package-tarball
          path: .

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Publish package
        shell: bash
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist_tag || 'latest' }}
        run: bun publish --access public --tag "$DIST_TAG" ./*.tgz
