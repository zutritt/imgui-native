name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package after packaging"
        required: true
        type: boolean
        default: false
      dist_tag:
        description: "Registry dist-tag"
        required: true
        type: string
        default: "latest"

permissions:
  contents: read

jobs:
  build-prebuilds:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-14
            platform: darwin
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r deps/dear_bindings/requirements.txt

      - name: Install native backend dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libgl1-mesa-dev

      - name: Install native backend dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: brew install glfw

      - name: Install native backend dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner"
          }
          vcpkg install glfw3:x64-windows
          "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native addon
        run: bun run build -- --arch=${{ matrix.arch }} --parallel 8

      - name: Verify required backends are enabled
        shell: bash
        run: |
          test -f build/CMakeCache.txt
          grep -q '^IMGUI_BACKEND_GLFW:BOOL=ON$' build/CMakeCache.txt
          grep -q '^IMGUI_RENDERER_OPENGL3:BOOL=ON$' build/CMakeCache.txt

      - name: Collect prebuild binary
        shell: bash
        run: |
          mkdir -p "prebuild/${{ matrix.platform }}-${{ matrix.arch }}"
          cp "build/Release/imgui.node" "prebuild/${{ matrix.platform }}-${{ matrix.arch }}/imgui.node"

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v7
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuild/${{ matrix.platform }}-${{ matrix.arch }}/imgui.node
          if-no-files-found: error

  pack:
    name: Assemble package
    runs-on: ubuntu-latest
    needs: build-prebuilds

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -r deps/dear_bindings/requirements.txt

      - name: Generate declaration files
        shell: bash
        run: |
          mkdir -p lib/gen/bindings
          python deps/dear_bindings/dear_bindings.py -o lib/gen/bindings/dcimgui deps/imgui/imgui.h
          python gen/main.py

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download prebuild artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: prebuild-*
          path: artifacts

      - name: Reconstruct prebuild layout
        shell: bash
        run: |
          mkdir -p prebuild/linux-x64 prebuild/win32-x64 prebuild/darwin-x64 prebuild/darwin-arm64
          cp artifacts/prebuild-linux-x64/imgui.node prebuild/linux-x64/imgui.node
          cp artifacts/prebuild-win32-x64/imgui.node prebuild/win32-x64/imgui.node
          cp artifacts/prebuild-darwin-x64/imgui.node prebuild/darwin-x64/imgui.node
          cp artifacts/prebuild-darwin-arm64/imgui.node prebuild/darwin-arm64/imgui.node

      - name: Verify prebuild matrix payload
        shell: bash
        run: |
          test -f prebuild/linux-x64/imgui.node
          test -f prebuild/win32-x64/imgui.node
          test -f prebuild/darwin-x64/imgui.node
          test -f prebuild/darwin-arm64/imgui.node

      - name: Verify declaration payload
        shell: bash
        run: |
          test -f lib/types.d.ts
          test -f lib/dts/ref.d.ts
          test -f lib/gen/dts/backends.d.ts
          test -f lib/gen/dts/enums.d.ts
          test -f lib/gen/dts/funcs.d.ts
          test -f lib/gen/dts/structs.d.ts
          test -f lib/gen/dts/typedefs.d.ts

      - name: Verify package contents
        shell: bash
        run: bun pm pack --dry-run --ignore-scripts

      - name: Build package tarball
        id: pack
        shell: bash
        run: |
          mkdir -p dist
          bun pm pack --ignore-scripts --filename dist/package.tgz > /dev/null
          TARBALL="dist/package.tgz"
          test -f "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Verify tarball declarations
        shell: bash
        run: |
          tar -tzf "${{ steps.pack.outputs.tarball }}" | grep -q '^package/lib/types.d.ts$'
          tar -tzf "${{ steps.pack.outputs.tarball }}" | grep -q '^package/lib/dts/ref.d.ts$'
          tar -tzf "${{ steps.pack.outputs.tarball }}" | grep -q '^package/lib/gen/dts/funcs.d.ts$'

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: ${{ steps.pack.outputs.tarball }}
          if-no-files-found: error

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: pack
    if: github.event_name == 'workflow_dispatch' && inputs.publish == true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: package-tarball
          path: dist

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Publish package
        shell: bash
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist_tag || 'latest' }}
        run: bun publish --access public --tag "$DIST_TAG" ./dist/*.tgz
